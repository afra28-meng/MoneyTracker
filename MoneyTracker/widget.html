<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aurum Ledger Widget</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #2b2929, #090907 72%);
        color: #f7f1e4;
      }
      .widget {
        width: min(90vw, 760px);
        aspect-ratio: 2.05 / 1;
        padding: 34px;
        border: 1px solid rgba(255,255,255,.16);
        border-radius: 42px;
        background: rgba(36,36,39,.92);
        box-shadow: 0 24px 80px rgba(0,0,0,.45);
      }
      header {
        display: flex;
        justify-content: space-between;
        gap: 24px;
      }
      h1 {
        margin: 0;
        font-size: clamp(25px, 5vw, 38px);
        font-weight: 720;
      }
      .expense {
        color: #ff615d;
        font-size: clamp(23px, 4vw, 36px);
      }
      .period {
        display: block;
        margin-top: 8px;
        color: rgba(247,241,228,.58);
        text-align: right;
        font-size: clamp(16px, 3vw, 25px);
      }
      .actions {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 22px;
        margin-top: 46px;
      }
      a {
        display: grid;
        place-items: center;
        gap: 12px;
        color: rgba(247,241,228,.74);
        text-decoration: none;
        font-size: clamp(16px, 3vw, 24px);
      }
      .bubble {
        width: clamp(72px, 12vw, 104px);
        aspect-ratio: 1;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: rgba(255,255,255,.08);
        color: #fff;
        font-size: clamp(36px, 7vw, 58px);
      }
    </style>
  </head>
  <body>
    <section class="widget" aria-label="Aurum Ledger widget preview">
      <header>
        <h1>Aurum Ledger</h1>
        <div>
          <span>Expense <strong class="expense">26,791.10</strong></span>
          <span class="period">5. 1. ~ 5. 31.</span>
        </div>
      </header>
      <nav class="actions" aria-label="Quick actions">
        <a href="./index.html?action=search"><span class="bubble">⌕</span><span>Search</span></a>
        <a href="./index.html?action=income"><span class="bubble">＋</span><span>In</span></a>
        <a href="./index.html?action=expense"><span class="bubble">−</span><span>Out</span></a>
        <a href="./index.html?action=transfer"><span class="bubble">⇄</span><span>Transfer</span></a>
      </nav>
    </section>
  </body>
</html>
